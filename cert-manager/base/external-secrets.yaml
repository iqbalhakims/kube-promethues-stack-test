apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: route53-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: route53-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: cert-manager/route53-credentials

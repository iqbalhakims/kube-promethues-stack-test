---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "teamstac350@gmail.com"
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: iqbalhakim-prod-tls
  namespace: istio-system
spec:
  secretName: iqbalhakim-prod-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argo.prod.iqbalhakim.ink
    - grafana.prod.iqbalhakim.ink
    - rollouts.prod.iqbalhakim.ink
    - prometheus.prod.iqbalhakim.ink
    - app.iqbalhakim.ink
    - api.iqbalhakim.ink
    - iqbalhakim.ink

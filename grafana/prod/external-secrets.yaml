apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kube-prometheus-stack-grafana
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: kube-prometheus-stack-grafana
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: monitoring/prod/kube-prometheus-stack-grafana
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-kube-prometheus-stack-alertmanager
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: monitoring/prod/alertmanager-kube-prometheus-stack-alertmanager
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

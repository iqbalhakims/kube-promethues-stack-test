name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

env:
  REGISTRY: registry.digitalocean.com/coffman

permissions:
  id-token: write   # required for OIDC
  contents: write   # required to push image tag updates

jobs:
  backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Fetch DO token from AWS SM
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DO, coffman/digitalocean-token
          parse-json-secrets: true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ env.DO_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:latest
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in values-prod.yaml
        run: |
          sed -i 's|tag: ".*"|tag: "${{ github.sha }}"|' charts/backend/values-prod.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/backend/values-prod.yaml
          git commit -m "ci: update backend image tag to ${{ github.sha }}"
          git push

  frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Fetch DO token from AWS SM
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DO, coffman/digitalocean-token
          parse-json-secrets: true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ env.DO_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:latest
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in values-prod.yaml
        run: |
          sed -i 's|tag: ".*"|tag: "${{ github.sha }}"|' charts/frontend/values-prod.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/frontend/values-prod.yaml
          git commit -m "ci: update frontend image tag to ${{ github.sha }}"
          git push
